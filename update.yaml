---
- name: Install package updates
  hosts: all
  become: true
  gather_facts: true
  tasks:

    # snapshot?

    - name: Install package updates
      include_role:
        name: packages
        tasks_from: update.yaml
      vars:
        reboot: false

    - name: Run base configuration tasks
      include_role:
        name: base_config
        tasks_from: basic_setup.yaml
      vars:
        reboot: false
    
    - name: Reboot system
      reboot:
        pre_reboot_delay: "{{ 15 | random(start=5) }}"  #Needed on some OS's
        reboot_timeout: "{{ reboot_timeout | default(600) }}"
        post_reboot_delay: "{{ post_reboot_delay | default(60) }}"
        test_command: hostname
