---
- name: Gather package facts
  ansible.builtin.package_facts:
    manager: auto
  when: >
    ansible_facts is not defined
    or ansible_facts.packages is not defined
    or force_gather_package_facts

- name: Check for snapd - apt (workaround for large package facts)
  ansible.builtin.shell:
    cmd: dpkg --list snapd
  failed_when: false
  changed_when: false
  check_mode: false
  register: dpkg_snapd
  when: ansible_pkg_mgr == "apt"

- name: Check for snapd - rpm (workaround for large package facts)
  ansible.builtin.shell:
    cmd: rpm -q snapd
  failed_when: false
  changed_when: false
  check_mode: false
  register: rpm_snapd
  when: ansible_pkg_mgr in ["dnf", "yum"]
