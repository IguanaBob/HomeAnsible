---
- name: Set the system hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Set the domain name in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ inventory_hostname }}.{{ domainname }} {{ inventory_hostname }}"
    state: present
    create: true

- name: Check current timezone
  ansible.builtin.command:
    cmd: timedatectl show --property=Timezone --value
  register: current_timezone
  changed_when: false

- name: Set timezone to America/Chicago
  ansible.builtin.command:
    cmd: timedatectl set-timezone America/Chicago
  when: current_timezone.stdout != "America/Chicago"

# Ubuntu / Debian: systemd-timesyncd
- name: Set NTP server in timesyncd configuration
  ansible.builtin.lineinfile:
    path: /etc/systemd/timesyncd.conf
    regexp: '^NTP='
    line: 'NTP=192.168.0.1'
    state: present
  notify: restart timesyncd
  when: ansible_facts['os_family'] == 'Debian'

# Alma / RHEL-family: chrony
- name: Set NTP server in chrony configuration (RHEL/Alma)
  ansible.builtin.lineinfile:
    path: /etc/chrony.conf
    regexp: '^server\s+192\.168\.0\.1(\s|$)'
    line: 'server 192.168.0.1 iburst'
    state: present
    insertafter: '^(#\s*)?(pool|server)\s+'
  notify: restart chronyd
  when: ansible_facts['os_family'] == 'RedHat'

# Temporary until it's removed from /etc/sysctl.conf on all hosts as we set this in /etc/sysctl.d/ above
- name: Remove any existing net.ipv6.conf.*.disable_ipv6 lines from /etc/sysctl.conf
  ansible.builtin.sysctl:
    name: "{{ item.name }}"
    state: absent
    sysctl_set: true
    sysctl_file: /etc/sysctl.conf
    reload: false
  loop:
    - { name: "net.ipv6.conf.all.disable_ipv6" }
    - { name: "net.ipv6.conf.default.disable_ipv6" }
    - { name: "net.ipv6.conf.lo.disable_ipv6" }
  register: remove_sysctl_ipv6

- name: Disable IPv6 in sysctl
  ansible.builtin.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_set: yes
    sysctl_file: /etc/sysctl.d/99-disable-ipv6.conf
    reload: false
  loop:
    - { name: "net.ipv6.conf.all.disable_ipv6", value: "1" }
    - { name: "net.ipv6.conf.default.disable_ipv6", value: "1" }
    - { name: "net.ipv6.conf.lo.disable_ipv6", value: "1" }
  register: add_sysctl_ipv6

- name: Apply sysctl changes
  ansible.builtin.command:
    cmd: sysctl -p
  when:
    - add_sysctl_ipv6.changed | default(false) | bool
    - remove_sysctl_ipv6.changed | default(false) | bool

- name: Set default editor to vim in root profile
  ansible.builtin.lineinfile:
    path: /root/.profile
    line: 'export EDITOR=/usr/bin/vim'
    state: present

- name: Set default editor to vim in skel profile
  ansible.builtin.lineinfile:
    path: /etc/skel/.profile
    line: 'export EDITOR=/usr/bin/vim'
    state: present

- name: Create symlink for pigz to gzip if pigz is installed
  ansible.builtin.file:
    src: /usr/bin/pigz
    dest: /usr/local/bin/gzip
    state: link
  when: ansible_facts.packages.pigz is defined

- name: Add cp alias to root bash aliases
  ansible.builtin.lineinfile:
    path: /root/.bash_aliases
    line: "alias cp='cp --reflink=auto'"
    create: true
    state: present

- name: Add cp alias to skel bash aliases
  ansible.builtin.lineinfile:
    path: /etc/skel/.bash_aliases
    line: "alias cp='cp --reflink=auto'"
    create: true
    state: present

- name: Set grub editenv command by OS family
  ansible.builtin.set_fact:
    grub_editenv_cmd: "{{ 'grub-editenv' if ansible_os_family == 'Debian' else 'grub2-editenv' }}"

- name: Read grub environment
  ansible.builtin.command:
    cmd: "{{ grub_editenv_cmd }} - list"
  register: grubenv
  changed_when: false

- name: Ensure grub menu auto hide is disabled
  ansible.builtin.command:
    cmd: "{{ grub_editenv_cmd }} - set menu_auto_hide=0"
  when: "'menu_auto_hide=0' not in grubenv.stdout"

- name: Ensure boot_success is unset
  ansible.builtin.command:
    cmd: "{{ grub_editenv_cmd }} - unset boot_success"
  when: "'boot_success=' in grubenv.stdout"

- name: Set grub timeout
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_TIMEOUT='
    line: 'GRUB_TIMEOUT=30'
    state: present
  notify: update grub

- name: Set grub timeout style to menu
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_TIMEOUT_STYLE='
    line: 'GRUB_TIMEOUT_STYLE=menu'
    insertafter: '^GRUB_TIMEOUT='
    state: present
  notify: update grub
